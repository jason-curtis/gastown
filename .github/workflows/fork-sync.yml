name: Sync fork with upstream

on:
  schedule:
    - cron: '0 4 * * *' # 04:00 UTC daily (before nightly-integration at 06:00)
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          # PAT with workflow scope — GITHUB_TOKEN cannot push workflow file changes
          token: ${{ secrets.SYNC_TOKEN }}

      - name: Sync fork
        run: |
          git remote add upstream https://github.com/steveyegge/gastown.git
          git fetch upstream main

          LOCAL=$(git rev-parse HEAD)
          UPSTREAM=$(git rev-parse upstream/main)

          if [ "$LOCAL" = "$UPSTREAM" ]; then
            echo "Already up to date"
            exit 0
          fi

          if git merge-base --is-ancestor HEAD upstream/main; then
            git merge upstream/main --ff-only
          else
            git merge upstream/main --no-edit
          fi

          git push origin main
          echo "Synced with upstream"
