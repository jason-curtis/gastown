name: Sync fork with upstream

on:
  schedule:
    - cron: '0 4 * * *' # 04:00 UTC daily (before nightly-integration at 06:00)
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Sync fork
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Use GitHub API to merge upstream into fork
          RESULT=$(gh api repos/${{ github.repository }}/merge-upstream \
            -X POST -f branch=main --jq '.merge_type' 2>&1) || true

          case "$RESULT" in
            none)
              echo "Already up to date"
              ;;
            fast-forward|merge)
              echo "Synced via $RESULT"
              ;;
            *)
              echo "::warning::Fork sync failed: $RESULT"
              echo "Manual merge may be required"
              exit 1
              ;;
          esac
